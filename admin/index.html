<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin — Pressing du Parc Heller</title>
  <meta name="robots" content="noindex, nofollow" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/admin/admin.css" />
</head>
<body class="login-page">

  <div class="login-container">
    <div class="login-brand">
      <span class="brand-icon">✦</span>
      <h1>Pressing <span>Parc Heller</span></h1>
      <p>Panneau d'administration</p>
    </div>

    <form class="login-form" id="loginForm" novalidate>
      <div class="form-group">
        <label for="email">Adresse email</label>
        <input
          type="email"
          id="email"
          name="email"
          placeholder="pressingparcheller@yahoo.fr"
          autocomplete="email"
          required
        />
      </div>

      <div class="form-group">
        <label for="password">Mot de passe</label>
        <div class="input-wrap">
          <input
            type="password"
            id="password"
            name="password"
            placeholder="••••••••"
            autocomplete="current-password"
            required
          />
          <button type="button" class="toggle-pw" id="togglePw" aria-label="Afficher le mot de passe">
            <svg id="eyeIcon" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
              <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
              <circle cx="12" cy="12" r="3"/>
            </svg>
          </button>
        </div>
      </div>

      <div class="form-error" id="formError" role="alert" aria-live="polite"></div>

      <button type="submit" class="btn-login" id="btnLogin">
        <span id="btnText">Se connecter</span>
        <span id="btnLoader" class="loader" style="display:none"></span>
      </button>
    </form>

    <a href="/" class="back-link">← Retour au site</a>
  </div>

  <script src="/admin/login.js"></script>
</body>
</html>
